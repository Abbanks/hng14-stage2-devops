name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Python
        run: |
          pip install flake8
          flake8 api/ worker/ --count --select=E9,F63,F7,F82 --show-source --statistics 
      - name: Lint JS
        run: |
          cd frontend && npm install && npx eslint . --fix || true
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: |
          pip install pytest pytest-cov fakeredis fastapi httpx redis
          cd api && pytest test_main.py --cov=. --cov-report=xml
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push All Images
        run: |
          for service in frontend api worker; do
            docker build -t localhost:5000/${service}:${{ github.sha }} ./${service}
            docker tag localhost:5000/${service}:${{ github.sha }} localhost:5000/${service}:latest
            docker push localhost:5000/${service}:${{ github.sha }}
            docker push localhost:5000/${service}:latest
          done

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Scan API Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/api:latest'
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Scan Worker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/worker:latest'
          format: 'sarif'
          output: 'trivy-worker.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Upload Security Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-results
          path: "*.sarif"

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Stack
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          docker-compose up -d
          sleep 15
          URL="http://localhost:3000"
          JOB_ID=$(curl -s -X POST $URL/submit | jq -r '.job_id')
          
          for i in {1..10}; do
            STATUS=$(curl -s $URL/status/$JOB_ID | jq -r '.status')
            if [ "$STATUS" == "completed" ]; then
              echo "Success!"
              exit 0
            fi
            sleep 5
          done
          echo "Failed to complete"
          exit 1
      - name: Cleanup
        if: always()
        run: docker-compose down

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rolling Update
        run: |
          docker-compose up -d --no-deps --build

          TIMEOUT=60
          while [ $TIMEOUT -gt 0 ]; do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker ps -qf "name=frontend"))" == "healthy" ]; then
               echo "Deployed!"
               exit 0
            fi
            sleep 5
            TIMEOUT=$((TIMEOUT-5))
          done
          echo "Timed out!"
          exit 1