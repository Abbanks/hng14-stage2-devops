services:
  redis:
    image: redis:7-alpine

    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - job-network
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APP_ENV=${APP_ENV}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - job-network
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - job-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - API_URL=http://api:8000
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - job-network
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M

networks:
  job-network:
    driver: bridge